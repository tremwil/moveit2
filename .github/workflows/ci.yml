name: CI

on:
  push:
    branches: [main]
    tags: ["v[0-9]+*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --check --all -- --files-with-diff

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: RUSTFLAGS="-D warnings" cargo clippy --workspace --all-features    

  doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - run: RUSTFLAGS="-D warnings" RUSTDOCFLAGS='--cfg docsrs' cargo doc --all-features

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: RUSTFLAGS='--cfg moveit2_no_drop_flag_abort' cargo test --workspace --all-features
  
  miri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - run: cargo miri test --all-features

  release:
    permissions:
      contents: write

    name: release${{ case(github.event_name == 'push', '', ' dry-run') }}
    runs-on: ubuntu-latest
    needs:
      - rustfmt
      - clippy
      - doc
      - tests
      - miri
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: Publish packages (dry-run)
        if: github.event_name != 'push'
        run: .github/workflows/release.sh --dry-run

      - name: Publish packages
        id: publish
        if: github.event_name == 'push'
        run: .github/workflows/release.sh --token ${{ secrets.CRATES_IO_TOKEN }}

      - name: Create GitHub release
        if: github.event_name == 'push' && steps.publish.outputs.need-publish == 'true'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: v${{ steps.publish.outputs.moveit2 }}

  all-checks-pass:
    name: Verify that all checks passed
    runs-on: ubuntu-latest
    if: always()
    needs:
      - rustfmt
      - clippy
      - doc
      - tests
      - miri
      - release
    steps:
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJson(needs) }}